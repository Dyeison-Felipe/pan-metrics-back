version: '3.8'

services:
  bs_postgres:
    image: postgres:16
    container_name: bs_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: barber_db_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  bs_postgres_test:
    image: postgres:16
    container_name: bs_postgres_test
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: barber_db_dev_test
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
  postgres_data_test:
